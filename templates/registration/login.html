{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — Voleibol Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}"/>
  <link rel="stylesheet" href="{% static 'css/login.css' %}"/>
</head>
<body class="login-body">

  <canvas id="lienzo-fondo"></canvas>

  <!-- Logo arriba -->
  <a href="/" class="login-logo">
    <svg class="logo-balon" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="brillo-logo">
          <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle cx="30" cy="30" r="26" fill="none" stroke="#ffffff" stroke-width="1.5" filter="url(#brillo-logo)" opacity="0.9"/>
      <path d="M 10 20 Q 30 5 50 20" fill="none" stroke="#00C853" stroke-width="1.8" filter="url(#brillo-logo)"/>
      <path d="M 10 40 Q 30 55 50 40" fill="none" stroke="#E53935" stroke-width="1.8" filter="url(#brillo-logo)"/>
      <path d="M 15 12 Q 8 30 15 48" fill="none" stroke="#ffffff" stroke-width="1.5" filter="url(#brillo-logo)" opacity="0.7"/>
      <path d="M 45 12 Q 52 30 45 48" fill="none" stroke="#ffffff" stroke-width="1.5" filter="url(#brillo-logo)" opacity="0.7"/>
      <path d="M 30 4 Q 30 30 30 56" fill="none" stroke="#00C853" stroke-width="1.2" filter="url(#brillo-logo)" opacity="0.5"/>
    </svg>
    <span class="logo-texto">VOLEIBOL</span>
  </a>

  <!-- Tarjeta de login -->
  <div class="login-wrap">

    <div class="login-card">
      <canvas class="login-borde" aria-hidden="true"></canvas>

      <div class="login-card-inner">
        <p class="texto-subtitulo">Panel administrativo</p>
        <h1 class="login-titulo">ACCESO <span class="acento-verde">ADMIN</span></h1>

        {% if form.errors %}
        <div class="login-error">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
          Usuario o contraseña incorrectos.
        </div>
        {% endif %}

        <form method="post" class="login-form">
          {% csrf_token %}

          <div class="campo">
            <label for="id_username">USUARIO</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
              <input type="text" name="username" id="id_username" autocomplete="username" required placeholder="usuario"/>
            </div>
          </div>

          <div class="campo">
            <label for="id_password">CONTRASEÑA</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
              </svg>
              <input type="password" name="password" id="id_password" autocomplete="current-password" required placeholder="••••••••"/>
            </div>
          </div>

          <input type="hidden" name="next" value="{{ next }}"/>

          <button type="submit" class="btn-login">
            <span>INGRESAR</span>
            <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
              <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
          </button>
        </form>
      </div>
    </div>

    <p class="login-volver"><a href="/">← Volver al sitio</a></p>
  </div>

  <script>
    // Partículas fondo
    (function(){
      const cv  = document.getElementById('lienzo-fondo');
      const ctx = cv.getContext('2d');
      let pts   = [];
      function resize() {
        cv.width  = innerWidth;
        cv.height = innerHeight;
      }
      function mkP() {
        return {
          x:  Math.random() * cv.width,
          y:  Math.random() * cv.height,
          r:  Math.random() * 1.4 + 0.3,
          vx: (Math.random() - .5) * .3,
          vy: (Math.random() - .5) * .3,
          op: Math.random() * .35 + .05,
        };
      }
      resize();
      pts = Array.from({ length: 60 }, mkP);
      addEventListener('resize', resize);
      (function loop() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, cv.width, cv.height);
        pts.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0)         p.x = cv.width;
          if (p.x > cv.width)  p.x = 0;
          if (p.y < 0)         p.y = cv.height;
          if (p.y > cv.height) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.op})`;
          ctx.fill();
        });
        requestAnimationFrame(loop);
      })();
    })();

    // Borde serpiente en la tarjeta
    (function(){
      const card = document.querySelector('.login-card');
      const cb   = document.querySelector('.login-borde');
      if (!card || !cb) return;

      function aj() {
        const r = card.getBoundingClientRect();
        if (r.width > 0 && r.height > 0) {
          cb.width  = r.width  + 4;
          cb.height = r.height + 4;
        }
      }
      new ResizeObserver(aj).observe(card);
      addEventListener('resize', aj);
      requestAnimationFrame(aj);

      const ctx = cb.getContext('2d');
      let t = 0;
      const LEN = 0.38, vel = 0.0018;

      function col(p) {
        if (p < .5) { const f = p / .5; return `rgb(${~~(f*255)},${~~(200+f*55)},${~~(83+f*172)})`; }
        const f = (p - .5) / .5; return `rgb(255,${~~(255-f*255)},${~~(255-f*255)})`;
      }

      function genPts(w, h, r, n) {
        const ps = [], paso = (2*(w-2*r) + 2*(h-2*r) + 2*Math.PI*r) / n;
        function seg(x0,y0,x1,y1) {
          const d = Math.hypot(x1-x0, y1-y0), s = Math.max(1, ~~(d/paso));
          for (let i = 0; i < s; i++) { const f = i/s; ps.push({x: x0+f*(x1-x0), y: y0+f*(y1-y0)}); }
        }
        function arc(cx,cy,ra,a0,a1) {
          const s = Math.max(2, ~~(ra*Math.abs(a1-a0)/paso));
          for (let i = 0; i < s; i++) { const a = a0+i/s*(a1-a0); ps.push({x: cx+Math.cos(a)*ra, y: cy+Math.sin(a)*ra}); }
        }
        const PI = Math.PI;
        seg(r,0,w-r,0); arc(w-r,r,r,-PI/2,0);
        seg(w,r,w,h-r); arc(w-r,h-r,r,0,PI/2);
        seg(w-r,h,r,h); arc(r,h-r,r,PI/2,PI);
        seg(0,h-r,0,r); arc(r,r,r,PI,3*PI/2);
        return ps;
      }

      let pts2 = [], uw = 0, uh = 0;
      (function draw() {
        const w = cb.width, h = cb.height;
        ctx.clearRect(0, 0, w, h);
        if (!w || !h) { requestAnimationFrame(draw); return; }
        if (w !== uw || h !== uh) { pts2 = genPts(w, h, 8, 300); uw = w; uh = h; }
        const n = pts2.length;
        if (n < 2) { requestAnimationFrame(draw); return; }
        t = (t + vel) % 1;
        const cola = ~~(((t - LEN + 1) % 1) * n), pasos = ~~(n * LEN);
        for (let i = 0; i < pasos; i++) {
          const idx = (cola+i)%n, sig = (idx+1)%n, p = i/pasos;
          ctx.beginPath();
          ctx.moveTo(pts2[idx].x, pts2[idx].y);
          ctx.lineTo(pts2[sig].x, pts2[sig].y);
          ctx.strokeStyle  = col(p);
          ctx.globalAlpha  = .4 + p * .6;
          ctx.lineWidth    = 1.5 + p * 2.5;
          ctx.shadowColor  = col(p);
          ctx.shadowBlur   = 8 + p * 12;
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur  = 0;
        requestAnimationFrame(draw);
      })();
    })();
  </script>
</body>
</html>
